project_root: .

datasets:
  multiwoz_dataset_id: pfb30/multi_woz_v22
  multiwoz_splits:
    - train
    - validation
    - test
  sample_size: 300
  seed: 42
  translation_path: dataset/spa.txt
  spanglish_paths:
    - dataset/spanish_texts/lid_spaeng_train.csv
    - dataset/spanish_texts/lid_spaeng_validation.csv
    - dataset/spanish_texts/lid_spaeng_test.csv
  control_output_csv: outputs/datasets/control_eng.csv
  cleaned_spanglish_output_csv: outputs/datasets/cleaned_spanglish_corpus.csv

generation:
  final_target_size: 300
  switch_ratios:
    - 0.10
    - 0.25
    - 0.50
    - 0.75
  switch_types:
    - intra-sentential
    - inter-sentential
  unfinetuned_output_csv: outputs/datasets/unfinetuned_engesp.csv
  finetuned_output_csv: outputs/datasets/finetuned_engesp.csv
  unfinetuned_candidates_csv: outputs/datasets/unfinetuned_candidates.csv
  finetuned_candidates_csv: outputs/datasets/finetuned_candidates.csv
  base_generator_model: Qwen/Qwen3-8B
  finetune_base_model: Qwen/Qwen3-8B
  eval_models:
    - Qwen/Qwen2.5-1.5B-Instruct
    - Qwen/Qwen2.5-3B-Instruct
  max_attempts_per_prompt: 8
  max_new_tokens: 96
  temperature: 0.7
  top_p: 0.9
  quantize_4bit: true

finetune:
  adapter_output_dir: outputs/models/spanglish_adapter
  learning_rate: 0.0002
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 256
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  train_text_limit: 12000
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  logging_steps: 10
  resume_from_checkpoint: true

judge:
  xlmr_model: FacebookAI/xlm-roberta-base
  naturalness_reference_limit: 2048

evaluation:
  output_raw_csv: outputs/evaluations/llm_eval_raw.csv
  output_summary_csv: outputs/evaluations/llm_eval_summary.csv
  judge_batch_size: 16
